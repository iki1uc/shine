<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ALT INDEX</title>
  <style>
    body.old-effect {
      background:#1a1a1a;
      color:#ff8800;
      font-family:monospace;
      animation:oldPulse 1.5s infinite;
      text-align:center;
      padding-top:40px;
    }
    @keyframes oldPulse {
      0% { filter:brightness(1); }
      50% { filter:brightness(1.4); }
      100% { filter:brightness(1); }
    }
    a {
      display:inline-block;
      margin:10px;
      padding:8px 16px;
      border-radius:4px;
      text-decoration:none;
      border:1px solid #ff8800;
      color:#ff8800;
    }
  </style>
</head>
<body class="old-effect">

  <h1>ALTER INDEX AKTIV</h1>

  <a href="/index.html">NEU STARTEN</a>

</body>
</html>
