<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RUN – itime</title>
<style>
  body{background:#0d0d0f;color:#00eaff;font-family:monospace;text-align:center;padding-top:40px;}
  pre{background:#111;padding:20px;border:1px solid #00eaff;border-radius:4px;display:inline-block;text-align:left;}
</style>
</head>
<body>

<h1>RUN – itime</h1>

<pre id="out">warte…</pre>

<script>
function updateItime() {
  const itime = Math.floor(performance.now());
  document.getElementById("out").textContent = "innerer Takt (itime): " + itime;
}
updateItime();
setInterval(updateItime, 500);
</script>

</body>
</html>
