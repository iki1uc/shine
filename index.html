<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NEU INDEX</title>
  <style>
    body.new-effect {
      background:#0d0d0f;
      color:#00eaff;
      font-family:monospace;
      animation:newPulse 1.5s infinite;
      text-align:center;
      padding-top:40px;
    }
    @keyframes newPulse {
      0% { filter:brightness(1); }
      50% { filter:brightness(2.2); }
      100% { filter:brightness(1); }
    }
    a {
      display:inline-block;
      margin:10px;
      padding:8px 16px;
      border-radius:4px;
      text-decoration:none;
      border:1px solid #00eaff;
      color:#00eaff;
      cursor:pointer;
    }
  </style>
</head>
<body class="new-effect">

  <h1>NEUER INDEX AKTIV</h1>

  <a href="/old/index.html">ALT‑ANSICHT</a>
  <a href="/run.html">RUN</a>
  <a href="/list.html">LIST</a>

  <!-- SHINE bekommt jetzt eine Abfang-Funktion -->
  <a id="shineBtn">SHINE</a>

  <script>
    document.getElementById("shineBtn").onclick = () => {
      const antwort = prompt("SHINE öffnen?\nOK = Ja\nNEIN = Abbrechen\nVIELLEICHT = Später");
      if (antwort === null) return; // Abbruch
      if (antwort.toLowerCase() === "ok") {
        window.location.href = "/shine/shine.respo.html";
      } else if (antwort.toLowerCase() === "vielleicht") {
        alert("Alles klar – wir warten noch.");
      } else {
        alert("SHINE wurde nicht geöffnet.");
      }
    };
  </script>

</body>
</html>
