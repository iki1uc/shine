<a id="shineBtn">SHINE (RESPO)</a>

<script>
  document.getElementById("shineBtn").onclick = () => {

    // RESPO-SHINE Kern
    const shine = {
      name: "SHINE-RESPO",
      rev: "1.1",
      state: "EI",
      pulse() {
        this.state = "OMELETT";
        return "OK – SHINE RESPO AKTIV";
      },
      deny() {
        this.state = "SATT";
        return "NEIN – SHINE ABGELEHNT";
      },
      maybe() {
        this.state = "EI";
        return "VIELLEICHT – SHINE WARTET";
      }
    };

    const antwort = prompt("SHINE RESPO?\nOK / NEIN / VIELLEICHT");

    if (!antwort) return;

    const a = antwort.toLowerCase();

    if (a === "ok") {
      alert(shine.pulse());
    } else if (a === "vielleicht") {
      alert(shine.maybe());
    } else {
      alert(shine.deny());
    }
  };
</script>
