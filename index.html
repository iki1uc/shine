<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NEU INDEX</title>
  <style>
    body {
      background:#0d0d0f;
      color:#00eaff;
      font-family:monospace;
      text-align:center;
      padding-top:40px;
    }
    a {
      display:inline-block;
      margin:10px;
      padding:10px 20px;
      border:1px solid #00eaff;
      border-radius:4px;
      text-decoration:none;
      color:#00eaff;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h1>4‑KNOPF‑ENTSCHEIDER</h1>

<a id="btnAlt">ALT‑ANSICHT</a>
<a id="btnRun">RUN</a>
<a id="btnList">LIST</a>
<a id="btnShine">SHINE</a>

<script>
  document.getElementById("btnAlt").onclick = () => {
    alert("ALT sagt: 'Ich war schon da, bevor du kamst.'");
  };

  document.getElementById("btnRun").onclick = () => {
    alert("RUN sagt: 'Sag mir wann – ich laufe sofort los.'");
  };

  document.getElementById("btnList").onclick = () => {
    alert("LIST sagt: 'Ich zeige dir alles, was du besitzt.'");
  };

  document.getElementById("btnShine").onclick = () => {
    alert("SHINE sagt: 'Ich leuchte, wenn du bereit bist.'");
  };
</script>

</body>
</html>
